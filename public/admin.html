<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Michała</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; align-items: flex-start; justify-content: center; padding: 48px 20px; min-height: 100vh; }
    .admin-card {
      background: var(--surface);
      border: 1px solid var(--muted);
      border-radius: 16px;
      padding: 36px 32px;
      max-width: 460px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .admin-card h1 { font-size: 22px; letter-spacing: 1px; }
    .admin-card h1 span { color: var(--accent); }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 12px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; }
    .form-group input[type="password"],
    .form-group input[type="text"] {
      background: var(--surface-alt);
      border: 1px solid var(--muted);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .time-row { display: flex; gap: 8px; align-items: center; }
    .time-row input[type="number"] {
      background: var(--surface-alt);
      border: 1px solid var(--muted);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      padding: 10px 14px;
      outline: none;
      width: 80px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .time-row input[type="number"]:focus { border-color: var(--accent); }
    .time-sep { font-size: 28px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .info-row {
      background: var(--surface-alt);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }
    .info-row .mono { color: var(--text-primary); }
    .preview-box {
      background: var(--surface-alt);
      border: 1px solid rgba(200,241,53,0.25);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .preview-box h3 { font-size: 13px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .preview-row { display: flex; justify-content: space-between; font-size: 13px; }
    .preview-row .label { color: var(--text-muted); }
    .error-msg { color: var(--danger); font-size: 13px; min-height: 18px; }
    .success-msg { color: var(--accent); font-size: 13px; font-family: 'Space Grotesk', sans-serif; font-weight: 600; }
    #section-logged { display: none; }
    .warning-box {
      background: rgba(248,196,0,0.08);
      border: 1px solid rgba(248,196,0,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--gold);
    }
    .btn-row { display: flex; gap: 10px; }
    .payout-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
    .payout-item { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 8px; background: var(--surface); border-radius: 6px; }
    .no-winner-msg { color: var(--gold); font-weight: 600; }
    a.back-link { color: var(--text-muted); font-size: 13px; text-decoration: none; margin-top: 4px; }
    a.back-link:hover { color: var(--text-primary); }
  </style>
</head>
<body>
  <div class="admin-card">
    <h1>PANEL <span>MICHAŁA</span></h1>

    <!-- LOGIN SECTION -->
    <div id="section-login">
      <div class="form-group">
        <label>Hasło</label>
        <input type="password" id="admin-password" placeholder="michal123" autocomplete="current-password" />
      </div>
      <button class="btn-primary" id="btn-admin-login" style="width:100%;margin-top:8px">Wejdź</button>
      <div class="error-msg" id="login-err"></div>
    </div>

    <!-- LOGGED SECTION -->
    <div id="section-logged">

      <div class="info-row">
        <span>Zakładów dzisiaj</span>
        <span class="mono" id="info-bets">–</span>
      </div>
      <div class="info-row">
        <span>Łączna pula</span>
        <span class="mono accent" id="info-pool">–</span>
      </div>
      <div class="info-row" id="result-done-row" style="display:none">
        <span>Wynik już wpisany</span>
        <span class="mono accent" id="result-done-slot">–</span>
      </div>

      <div id="section-form">
        <div class="form-group">
          <label>O której wyszedłeś?</label>
          <div class="time-row">
            <input type="number" id="time-hour" min="10" max="17" value="12" />
            <span class="time-sep">:</span>
            <input type="number" id="time-min" min="0" max="59" value="30" />
          </div>
        </div>

            <div class="btn-row">
          <button class="btn-primary" id="btn-preview" style="flex:1">Podgląd wyników</button>
        </div>

        <div id="preview-section" style="display:none">
          <div class="preview-box">
            <h3>Podgląd</h3>
            <div class="preview-row"><span class="label">Wygrywający slot</span><span class="mono accent" id="prev-slot">–</span></div>
            <div class="preview-row"><span class="label">Liczba wygranych</span><span class="mono" id="prev-winners">–</span></div>
            <div class="preview-row"><span class="label">Pula do podziału</span><span class="mono" id="prev-pool">–</span></div>
            <div class="preview-row"><span class="label">Do banku biurowego</span><span class="mono gold" id="prev-bank">–</span></div>
            <div class="payout-list" id="prev-payouts"></div>
            <div id="no-winner-section" style="display:none" class="no-winner-msg">😶 Nikt nie obstawiał dziś</div>
          </div>
          <button class="btn-danger" id="btn-confirm" style="width:100%;margin-top:12px">Zatwierdź i rozlicz dzień</button>
        </div>

        <div class="error-msg" id="result-err"></div>
      </div>

      <div class="success-msg" id="success-msg" style="display:none"></div>

      <hr class="dim" style="margin:4px 0" />

      <!-- Zarządzanie graczami -->
      <div id="section-players">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <h3 style="font-size:13px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase">GRACZE</h3>
          <button class="btn-ghost" id="btn-load-players">Załaduj</button>
        </div>
        <div id="players-list"></div>
        <div class="error-msg" id="players-err"></div>
      </div>

      <a href="/" class="back-link">← Wróć do gry</a>
    </div>
  </div>

  <script>
    let adminPassword = '';

    document.getElementById('admin-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-admin-login').click();
    });

    document.getElementById('btn-admin-login').addEventListener('click', async () => {
      adminPassword = document.getElementById('admin-password').value;
      const errEl = document.getElementById('login-err');
      errEl.textContent = '';

      try {
        const r = await fetch(`/api/admin/today?password=${encodeURIComponent(adminPassword)}`);
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);

        document.getElementById('section-login').style.display = 'none';
        document.getElementById('section-logged').style.display = 'flex';
        document.getElementById('section-logged').style.flexDirection = 'column';
        document.getElementById('section-logged').style.gap = '16px';

        document.getElementById('info-bets').textContent = d.bets.length;
        document.getElementById('info-pool').textContent = d.total_pool + ' ish';

        if (d.result) {
          document.getElementById('result-done-row').style.display = 'flex';
          document.getElementById('result-done-slot').textContent = d.result.winning_slot;
          document.getElementById('section-form').style.display = 'none';
        }

        checkEarlyWarning();
      } catch (e) {
        errEl.textContent = e.message;
      }
    });

    document.getElementById('btn-preview').addEventListener('click', async () => {
      const h = String(document.getElementById('time-hour').value).padStart(2,'0');
      const m = String(document.getElementById('time-min').value).padStart(2,'0');
      const actual_time = `${h}:${m}`;
      const errEl = document.getElementById('result-err');
      errEl.textContent = '';

      try {
        const r = await fetch('/api/admin/result', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ actual_time, password: adminPassword, preview: true })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);

        const slotNote = d.is_nearest_win
          ? `${d.winning_slot} <span style="color:var(--gold);font-size:11px">(najbliższy — nikt nie trafił ${d.exact_slot})</span>`
          : d.winning_slot;
        document.getElementById('prev-slot').innerHTML = slotNote;
        document.getElementById('prev-winners').textContent = d.winners_count;
        document.getElementById('prev-pool').textContent = d.winners_pool + ' ish';
        document.getElementById('prev-bank').textContent = d.bank_cut + ' ish';

        const payoutList = document.getElementById('prev-payouts');
        document.getElementById('no-winner-section').style.display = 'none';
        payoutList.innerHTML = d.payouts.map(p =>
          `<div class="payout-item"><span>${esc(p.nickname)}</span><span class="mono accent">+${p.payout} ish</span></div>`
        ).join('');

        document.getElementById('preview-section').style.display = 'block';
      } catch (e) {
        errEl.textContent = e.message;
      }
    });

    document.getElementById('btn-confirm').addEventListener('click', async () => {
      const h = String(document.getElementById('time-hour').value).padStart(2,'0');
      const m = String(document.getElementById('time-min').value).padStart(2,'0');
      const actual_time = `${h}:${m}`;
      const errEl = document.getElementById('result-err');
      errEl.textContent = '';

      document.getElementById('btn-confirm').disabled = true;
      document.getElementById('btn-confirm').textContent = 'Rozliczam...';

      try {
        const r = await fetch('/api/admin/result', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ actual_time, password: adminPassword })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);

        document.getElementById('section-form').style.display = 'none';
        document.getElementById('preview-section').style.display = 'none';
        const msg = document.getElementById('success-msg');
        msg.style.display = 'block';
        msg.textContent = `✓ Dzień rozliczony! Wygrywający slot: ${d.winning_slot} · ${d.winners_count} wygranych`;
        if (d.michal_comment) {
          const q = document.createElement('div');
          q.style.cssText = 'font-weight:400;color:var(--text-muted);font-style:italic;font-size:13px;margin-top:6px';
          q.textContent = `"${d.michal_comment}"`;
          msg.appendChild(q);
        }
      } catch (e) {
        errEl.textContent = e.message;
        document.getElementById('btn-confirm').disabled = false;
        document.getElementById('btn-confirm').textContent = 'Zatwierdź i rozlicz dzień';
      }
    });

    document.getElementById('btn-load-players').addEventListener('click', loadPlayers);

    async function loadPlayers() {
      const errEl = document.getElementById('players-err');
      errEl.textContent = '';
      try {
        const r = await fetch(`/api/admin/players?password=${encodeURIComponent(adminPassword)}`);
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        renderPlayers(d.players);
      } catch (e) {
        errEl.textContent = e.message;
      }
    }

    function renderPlayers(players) {
      const list = document.getElementById('players-list');
      if (!players.length) {
        list.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px 0">Brak graczy</div>';
        return;
      }
      list.innerHTML = players.map(p => `
        <div class="payout-item" style="align-items:center;gap:8px" id="player-row-${p.id}">
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.nickname)}</span>
          <span class="mono" style="font-size:11px;color:var(--text-muted)">${p.balance} ish</span>
          <button class="btn-ghost" style="font-size:11px;color:var(--danger);border-color:var(--danger);padding:3px 8px"
            onclick="deletePlayer(${p.id}, '${esc(p.nickname)}')">usuń</button>
        </div>
      `).join('');
    }

    async function deletePlayer(id, nickname) {
      if (!confirm(`Usunąć gracza "${nickname}" wraz ze wszystkimi zakładami?`)) return;
      const errEl = document.getElementById('players-err');
      errEl.textContent = '';
      try {
        const r = await fetch(`/api/admin/player/${id}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: adminPassword })
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        const row = document.getElementById(`player-row-${id}`);
        if (row) row.remove();
      } catch (e) {
        errEl.textContent = e.message;
      }
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
